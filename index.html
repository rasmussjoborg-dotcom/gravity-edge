<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Edge — XAUUSD Trading System</title>
  <meta name="description" content="Autonomous XAUUSD intraday trading system being developed through nightly AI deep research. Targeting FTMO 10K Challenge.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080c; --surface: #0f0f16; --surface-2: #16161f;
      --border: #1e1e2e; --text: #e4e4e7; --text-dim: #71717a;
      --gold: #c9a84c; --gold-dim: #a08832;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .container { max-width: 600px; text-align: center; padding: 2rem; }
    .logo { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 0.5rem; }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.025em; background: linear-gradient(135deg, var(--gold), #e8d5a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
    .subtitle { color: var(--text-dim); margin-bottom: 2rem; }
    .status { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .status-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .status-text { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--gold); }
    .meta { font-size: 0.75rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Gravity Edge</div>
    <h1>XAUUSD Trading System</h1>
    <p class="subtitle">Autonomous research engine · FTMO 10K 2-Step Challenge</p>
    <div class="status">
      <div class="status-icon">🧠</div>
      <div class="status-text">First research session tonight</div>
    </div>
    <p class="meta">9 system components · 0% complete · Night 0</p>
  </div>
</body>
</html>
